<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscrição - Desafio de Apneia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#d7edf4;
}

.topo{
    background:linear-gradient(180deg,#02263b,#001827);
    border-bottom:4px solid #00c8ff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo-cbes{
    height:160px;
}

.cmas-box{
    display:flex;
    align-items:center;
    gap:20px;
}

.cmas-box img{
    height:110px;
}

.container{
    max-width:1300px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.banner{
    width:100%;
    display:block;
    border-radius:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.full{
    grid-column:1 / -1;
}

.campo label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
    font-size:18px;
}

.obrigatorio{
    color:red;
}

.campo input,
.campo select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.check-group{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}

.botao{
    background:#0077cc;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.botao:hover{
    background:#005fa5;
}

.status{
    margin-top:15px;
    font-weight:bold;
}

@media(max-width:900px){

    .topo{
        flex-direction:column;
        text-align:center;
    }

    .logo-cbes{
        height:100px;
    }

    .cmas-box{
        margin-top:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .cmas-box img{
        height:70px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<header class="topo">

    <div>
        <img src="cbes.png" class="logo-cbes">
    </div>

    <div class="cmas-box">
        <img src="cmas.png">
        <img src="cmas-america.png">
        <img src="cmas-brazil.png">
    </div>

</header>

<div class="container">

    <div class="card">
        <img src="banner.png" class="banner">
    </div>

    <div class="card">

        <div class="form-grid">

            <div class="campo full">
                <label>Nome Completo <span class="obrigatorio">*</span></label>
                <input type="text" id="nome">
            </div>

            <div class="campo">
                <label>Data de Nascimento <span class="obrigatorio">*</span></label>
                <input type="date" id="nascimento">
            </div>

            <div class="campo">
                <label>Identidade <span class="obrigatorio">*</span></label>
                <input type="text" id="identidade">
            </div>

            <div class="campo">
                <label>Organização <span class="obrigatorio">*</span></label>

                <div class="check-group">
                    <label><input type="radio" name="organizacao" value="CIOPESP"> CIOPESP</label>
                    <label><input type="radio" name="organizacao" value="Corpo de Bombeiros"> Corpo de Bombeiros</label>
                </div>
            </div>

            <div class="campo">
                <label>Prova Escolhida <span class="obrigatorio">*</span></label>

                <div class="check-group">
                    <label><input type="checkbox" name="prova" value="Apneia Estática"> Apneia Estática</label>
                    <label><input type="checkbox" name="prova" value="Apneia Dinâmica"> Apneia Dinâmica</label>
                    <label><input type="checkbox" name="prova" value="Natação Equipada"> Natação Equipada</label>
                </div>
            </div>

            <div class="campo full">

                <label>QR Code CMAS</label>

                <p style="margin-bottom:10px;">
                    <a href="https://portal.cmas.org/" target="_blank">
                        https://portal.cmas.org/
                    </a>
                </p>

                <input type="file">

            </div>

        </div>

        <br>

        <button type="button" class="botao" onclick="enviarFormulario()">
            Enviar Inscrição
        </button>

        <div id="status" class="status"></div>

    </div>

</div>

<script>

function enviarFormulario(){

    const status = document.getElementById("status");

    const dados = {

        nome: document.getElementById("nome").value,

        nascimento: document.getElementById("nascimento").value,

        identidade: document.getElementById("identidade").value,

        organizacao:
            document.querySelector('input[name="organizacao"]:checked')?.value || "",

        prova:
            Array.from(
                document.querySelectorAll('input[name="prova"]:checked')
            )
            .map(item => item.value)
            .join(", ")

    };

    status.innerHTML = "Enviando inscrição...";

    fetch(
        "https://script.google.com/macros/s/AKfycbz6mhNXV8NYACMpw5kFz8OURwAQ4-TPsIxB5A9j6PFYb2OCH85CcN3leOGDlCWuvCwnKw/exec",
        {
            method:"POST",
            body:JSON.stringify(dados)
        }
    )

    .then(response => response.text())

    .then(() => {

        status.innerHTML = "✅ Inscrição enviada com sucesso!";

    })

    .catch(error => {

        status.innerHTML = "❌ Erro ao enviar inscrição.";

        console.error(error);

    });

}

</script>

</body>
</html>
