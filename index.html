<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Desafio Apneia Estática</title>

<style>

body{
    margin:0;
    background:#c7e8ef;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    margin-bottom:20px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,.08);
}

.logo{
    width:100%;
    display:block;
}

.banner{
    width:100%;
    display:block;
}

.header{
    padding:30px;
}

.header h1{
    margin:0;
    font-size:42px;
    font-weight:400;
}

.header p{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.question{
    padding:25px;
}

.question label{
    display:block;
    font-size:22px;
    margin-bottom:15px;
}

input[type=text],
input[type=date]{
    width:100%;
    border:none;
    border-bottom:1px solid #ccc;
    padding:12px;
    font-size:18px;
    box-sizing:border-box;
}

.option{
    margin:15px 0;
    font-size:20px;
}

button{
    background:#0097a7;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.footer{
    text-align:left;
    padding-bottom:40px;
}

.required{
    color:red;
}

@media(max-width:768px){

.header h1{
    font-size:30px;
}

.question label{
    font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">
<img src="./Design-CBES.png" class="logo">
</div>

<div class="card header">
<img src="./ChatGPT%20Image%2015%20de%20jun.%20de%202026,%2015_33_10.png" class="banner">
</div>

<div class="card">
<img src="ChatGPT Image 15 de jun. de 2026, 15_33_10.png" class="banner">
</div>

<div class="card question">
<label>Nome Completo <span class="required">*</span></label>
<input type="text">
</div>

<div class="card question">
<label>Data de Nascimento <span class="required">*</span></label>
<input type="date">
</div>

<div class="card question">
<label>Identidade <span class="required">*</span></label>
<input type="text">
</div>

<div class="card question">
<label>Organização <span class="required">*</span></label>

<div class="option">
<input type="checkbox"> CIOPESP
</div>

<div class="option">
<input type="checkbox"> Corpo de Bombeiros
</div>

</div>

<div class="card question">
<label>QR Code CMAS</label>

<p>
<a href="https://portal.cmas.org/" target="_blank">
https://portal.cmas.org/
</a>
</p>

<input type="file">
</div>

<div class="card question">
<label>Prova Escolhida <span class="required">*</span></label>

<div class="option">
<input type="checkbox"> Apneia Estática
</div>

<div class="option">
<input type="checkbox"> Apneia Dinâmica
</div>

<div class="option">
<input type="checkbox"> Natação Equipada
</div>

</div>

<div class="footer">
<button>Enviar</button>
</div>

</div>

</body>
</html>
