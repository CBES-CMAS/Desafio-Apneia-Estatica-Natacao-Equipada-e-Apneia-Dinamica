<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Desafio Apneia Estática, Natação Equipada e Apneia Dinâmica</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#d9eef4;
}

/* =======================
   CABEÇALHO ESTILO RAJA
======================= */

.topo{
    background:linear-gradient(180deg,#03263d,#011826);
    padding:25px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:4px solid #00c8ff;
}

.esquerda{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-cbes{
    height:120px;
}

.texto-cbes h2{
    color:white;
    font-size:52px;
    margin:0;
}

.texto-cbes p{
    color:white;
    font-size:20px;
    margin-top:5px;
}

.cmas-box{
    display:flex;
    align-items:center;
    gap:30px;
}

.cmas-box img{
    height:120px;
}

/* =======================
   CONTAINER
======================= */

.container{
    max-width:1300px;
    margin:auto;
    padding:30px 20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;

    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

/* =======================
   TÍTULO
======================= */

.titulo{
    text-align:center;
}

.titulo h1{
    color:#08244b;
    font-size:48px;
    margin-bottom:10px;
}

.titulo p{
    font-size:24px;
    color:#444;
}

/* =======================
   BANNER
======================= */

.banner{
    width:100%;
    display:block;
    border-radius:20px;
}

/* =======================
   FORMULÁRIO
======================= */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.full{
    grid-column:1 / -1;
}

.campo label{
    display:block;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
}

.obrigatorio{
    color:red;
}

.campo input,
.campo select{
    width:100%;
    padding:15px;
    border:1px solid #d2d2d2;
    border-radius:10px;
    font-size:16px;
}

.check-group{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:10px;
}

.check-group label{
    font-weight:normal;
}

/* =======================
   BOTÃO
======================= */

.botao{
    background:#0077cc;
    color:white;

    border:none;
    border-radius:10px;

    padding:16px 35px;

    font-size:18px;
    cursor:pointer;

    transition:.3s;
}

.botao:hover{
    background:#005da3;
}

/* =======================
   RESPONSIVO
======================= */

@media(max-width:900px){

    .topo{
        flex-direction:column;
        text-align:center;
    }

    .esquerda{
        flex-direction:column;
    }

    .cmas-box{
        margin-top:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .logo-cbes{
        height:90px;
    }

    .cmas-box img{
        height:80px;
    }

    .texto-cbes h2{
        font-size:38px;
    }

    .texto-cbes p{
        font-size:16px;
    }

    .titulo h1{
        font-size:32px;
    }

    .titulo p{
        font-size:18px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<!-- CABEÇALHO -->

<header class="topo">

    <div class="esquerda">

        <img src="cbes.jpg" class="logo-cbes">

        <div class="texto-cbes">
            <h2>CBES</h2>
            <p>Confederação Brasileira de Esportes Subaquáticos</p>
        </div>

    </div>

    <div class="cmas-box">
        <img src="cmas.jpg">
        <img src="cmas-america.jpg">
        <img src="cmas-brazil.jpg">
    </div>

</header>

<!-- CONTEÚDO -->

<div class="container">

    <div class="card titulo">

        <h1>
            Desafio Apneia Estática,
            Natação Equipada e Apneia Dinâmica
        </h1>

        <p>CIOPESP e Corpo de Bombeiros</p>

    </div>

    <div class="card">
        <img src="banner.jpeg" class="banner">
    </div>

    <div class="card">

        <div class="form-grid">

            <div class="campo full">
                <label>
                    Nome Completo
                    <span class="obrigatorio">*</span>
                </label>
                <input type="text">
            </div>

            <div class="campo">
                <label>
                    Data de Nascimento
                    <span class="obrigatorio">*</span>
                </label>
                <input type="date">
            </div>

            <div class="campo">
                <label>
                    Identidade
                    <span class="obrigatorio">*</span>
                </label>
                <input type="text">
            </div>

            <div class="campo">
                <label>
                    Organização
                    <span class="obrigatorio">*</span>
                </label>

                <div class="check-group">
                    <label>
                        <input type="checkbox">
                        CIOPESP
                    </label>

                    <label>
                        <input type="checkbox">
                        Corpo de Bombeiros
                    </label>
                </div>
            </div>

            <div class="campo">
                <label>
                    Prova Escolhida
                    <span class="obrigatorio">*</span>
                </label>

                <div class="check-group">
                    <label><input type="checkbox"> Apneia Estática</label>
                    <label><input type="checkbox"> Apneia Dinâmica</label>
                    <label><input type="checkbox"> Natação Equipada</label>
                </div>
            </div>

            <div class="campo full">
                <label>QR Code CMAS</label>

                <p style="margin-bottom:10px;">
                    <a href="https://portal.cmas.org/" target="_blank">
                        https://portal.cmas.org/
                    </a>
                </p>

                <input type="file">
            </div>

        </div>

        <br>

        <button class="botao">
            Enviar Inscrição
        </button>

    </div>

</div>

</body>
</html>
