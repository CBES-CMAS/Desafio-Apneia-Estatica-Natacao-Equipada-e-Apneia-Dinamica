<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscrição - Desafio de Apneia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#d7edf4;
}

/* ==========================
   CABEÇALHO
========================== */

.topo{
    background:linear-gradient(180deg,#02263b,#001827);
    border-bottom:4px solid #00c8ff;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 40px;
}

.logo-cbes{
    height:160px;
}

.cmas-box{
    display:flex;
    align-items:center;
    gap:20px;
}

.cmas-box img{
    height:110px;
}

/* ==========================
   CONTAINER
========================== */

.container{
    max-width:1300px;
    margin:auto;
    padding:30px;
}

/* ==========================
   CARDS
========================== */

.card{
    background:white;
    border-radius:20px;
    padding:30px;
    margin-bottom:25px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

/* ==========================
   BANNER
========================== */

.banner{
    width:100%;
    display:block;
    border-radius:20px;
}

/* ==========================
   FORMULÁRIO
========================== */

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.full{
    grid-column:1 / -1;
}

.campo label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
    font-size:18px;
}

.obrigatorio{
    color:red;
}

.campo input,
.campo select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.check-group{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}

.botao{
    background:#0077cc;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.botao:hover{
    background:#005fa5;
}

/* ==========================
   RESPONSIVO
========================== */

@media(max-width:900px){

    .topo{
        flex-direction:column;
        text-align:center;
    }

    .logo-cbes{
        height:100px;
    }

    .cmas-box{
        margin-top:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .cmas-box img{
        height:70px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<header class="topo">

    <div>
        <img src="cbes.png" class="logo-cbes">
    </div>

    <div class="cmas-box">
        <img src="cmas.png">
        <img src="cmas-america.png">
        <img src="cmas-brazil.png">
    </div>

</header>

<div class="container">

    <div class="card">
        <img src="banner.png" class="banner">
    </div>

    <div class="card">

        <div class="form-grid">

            <div class="campo full">
                <label>Nome Completo <span class="obrigatorio">*</span></label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Data de Nascimento <span class="obrigatorio">*</span></label>
                <input type="date">
            </div>

            <div class="campo">
                <label>Identidade <span class="obrigatorio">*</span></label>
                <input type="text">
            </div>

            <div class="campo">
                <label>Organização <span class="obrigatorio">*</span></label>

                <div class="check-group">
                    <label><input type="checkbox"> CIOPESP</label>
                    <label><input type="checkbox"> Corpo de Bombeiros</label>
                </div>
            </div>

            <div class="campo">
                <label>Prova Escolhida <span class="obrigatorio">*</span></label>

                <div class="check-group">
                    <label><input type="checkbox"> Apneia Estática</label>
                    <label><input type="checkbox"> Apneia Dinâmica</label>
                    <label><input type="checkbox"> Natação Equipada</label>
                </div>
            </div>

            <div class="campo full">

                <label>QR Code CMAS</label>

                <p style="margin-bottom:10px;">
                    <a href="https://portal.cmas.org/" target="_blank">
                        https://portal.cmas.org/
                    </a>
                </p>

                <input type="file">

            </div>

        </div>

        <br>

        <button class="botao">
            Enviar Inscrição
        </button>

    </div>

</div>

</body>
</html>
